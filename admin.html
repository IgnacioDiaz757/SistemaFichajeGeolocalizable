<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Asistencia Obra</title>
  <script>if(localStorage.getItem("theme")==="dark")document.documentElement.setAttribute("data-theme","dark");</script>
  <style>
    :root {
      --bg:        #f0f0f0;
      --surface:   #ffffff;
      --surface2:  #f9f9f9;
      --header-bg: #1a1a2e;
      --thead-bg:  #1a1a2e;
      --text:      #333333;
      --text-muted:#888888;
      --text-label:#666666;
      --border:    #cccccc;
      --border-lt: #eeeeee;
      --row-alt:   #f9f9f9;
      --row-hover: #eef2ff;
      --input-bg:  #ffffff;
      --zone-bg:   #37474f;
    }

    [data-theme="dark"] {
      --bg:        #0e1117;
      --surface:   #1a1f2e;
      --surface2:  #141921;
      --header-bg: #080b12;
      --thead-bg:  #080b12;
      --text:      #e0e0e8;
      --text-muted:#9ca3af;
      --text-label:#6b7280;
      --border:    #2d3748;
      --border-lt: #1e2433;
      --row-alt:   #141921;
      --row-hover: #1e2a3a;
      --input-bg:  #111827;
      --zone-bg:   #1e2533;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: Arial, sans-serif; background: var(--bg); color: var(--text); transition: background 0.2s, color 0.2s; }

    header {
      background: var(--header-bg); color: #fff;
      padding: 14px 20px;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 10px;
    }

    header h1 { font-size: 16px; font-weight: bold; }
    .acciones  { display: flex; gap: 8px; }

    .btn {
      padding: 8px 14px; border: none; border-radius: 6px;
      font-size: 13px; font-weight: bold; cursor: pointer;
    }

    .btn-verde  { background: #2e7d32; color: #fff; }
    .btn-azul   { background: #1565c0; color: #fff; }
    .btn-gris   { background: #555;    color: #fff; }
    .btn-naranja{ background: #e65100; color: #fff; }

    .contenido { max-width: 1100px; margin: 0 auto; padding: 16px; }

    /* Resumen */
    .resumen { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }

    .card-stat {
      flex: 1; min-width: 100px; background: var(--surface); border-radius: 8px;
      padding: 14px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .card-stat .numero { font-size: 28px; font-weight: bold; }
    .card-stat .label  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .verde { color: #2e7d32; }
    .rojo  { color: #c62828; }
    .gris  { color: var(--text-muted); }

    /* Filtros */
    .filtros {
      background: var(--surface); border-radius: 8px; padding: 12px 16px;
      margin-bottom: 16px; display: flex; gap: 10px;
      flex-wrap: wrap; align-items: flex-end;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .filtros label { font-size: 12px; color: var(--text-label); display: block; margin-bottom: 3px; }

    .filtros input {
      padding: 7px 10px; border: 1px solid var(--border);
      border-radius: 6px; font-size: 13px; width: 170px;
      background: var(--input-bg); color: var(--text);
    }

    /* Gestión de obras */
    .obras-section {
      background: var(--surface); border-radius: 8px; margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden;
    }

    .obras-header {
      background: var(--zone-bg); color: #fff;
      padding: 11px 16px;
      font-size: 13px; font-weight: bold;
      display: flex; align-items: center; justify-content: space-between;
    }

    .nueva-obra-form {
      padding: 14px 16px;
      display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end;
      border-bottom: 1px solid var(--border-lt);
    }

    .nueva-obra-form label { font-size: 12px; color: var(--text-label); display: block; margin-bottom: 3px; }

    .nueva-obra-form input[type="text"],
    .nueva-obra-form input[type="number"] {
      padding: 7px 10px; border: 1px solid var(--border);
      border-radius: 6px; font-size: 13px;
      background: var(--input-bg); color: var(--text);
    }

    .nueva-obra-form input[type="text"]   { width: 180px; }
    .nueva-obra-form input[type="number"] { width: 130px; }

    .obra-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; border-bottom: 1px solid var(--border-lt); font-size: 13px;
    }

    .obra-item:last-child { border-bottom: none; }

    .obra-info { display: flex; flex-direction: column; gap: 2px; }
    .obra-nombre { font-weight: 600; color: var(--text); }
    .obra-coords { font-size: 11px; color: var(--text-muted); }

    .empleado-nombre { font-weight: 600; color: var(--text); min-width: 100px; }

    /* Badges verificación */
    .v-ok   {
      display: inline-block; background: #e8f5e9; color: #2e7d32;
      border: 1px solid #a5d6a7; border-radius: 12px;
      padding: 2px 9px; font-size: 11px; font-weight: bold; white-space: nowrap;
    }

    .v-fail {
      display: inline-block; background: #ffebee; color: #c62828;
      border: 1px solid #ef9a9a; border-radius: 12px;
      padding: 2px 9px; font-size: 11px; font-weight: bold; white-space: nowrap;
    }

    .v-none {
      display: inline-block; color: #bbb;
      font-size: 11px; white-space: nowrap;
    }

    /* Tabla */
    .tabla-wrap {
      background: var(--surface); border-radius: 8px; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1); overflow-x: auto;
      margin-bottom: 24px;
    }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }

    thead th {
      background: var(--thead-bg); color: #fff;
      padding: 10px 14px; text-align: left; white-space: nowrap;
    }

    tbody tr:nth-child(even) { background: var(--row-alt); }
    tbody tr:hover { background: var(--row-hover); }
    tbody td { padding: 9px 14px; border-bottom: 1px solid var(--border-lt); color: var(--text); }
    td.nowrap { white-space: nowrap; }

    .tipo-ingreso { color: #2e7d32; font-weight: bold; white-space: nowrap; }
    .tipo-salida  { color: #c62828; font-weight: bold; white-space: nowrap; }

    a { color: #1565c0; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Lista por obra */
    .lista-titulo {
      font-size: 15px; font-weight: bold; color: var(--text);
      margin-bottom: 12px; padding-bottom: 6px;
      border-bottom: 2px solid var(--header-bg);
    }

    .empleado-bloque {
      background: var(--surface); border-radius: 8px; margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden;
    }

    .empleado-header {
      background: var(--header-bg); color: #fff;
      padding: 10px 16px; font-size: 14px; font-weight: bold;
      display: flex; justify-content: space-between; align-items: center;
    }

    .empleado-header .badge {
      background: rgba(255,255,255,0.2); border-radius: 12px;
      padding: 2px 10px; font-size: 12px; font-weight: normal;
    }

    .registro-fila {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 16px; border-bottom: 1px solid var(--border-lt);
      font-size: 13px; flex-wrap: wrap;
    }

    .registro-fila:last-child { border-bottom: none; }
    .registro-fila .tipo-ingreso,
    .registro-fila .tipo-salida { min-width: 80px; }
    .registro-fila .fecha { color: var(--text-muted); white-space: nowrap; }
    .registro-fila .dir   { color: var(--text); flex: 1; }

    .foto-thumb {
      width: 52px; height: 52px; object-fit: cover;
      border-radius: 8px; border: 1px solid var(--border);
      cursor: pointer; flex-shrink: 0; transition: opacity 0.15s;
    }

    .foto-thumb:hover { opacity: 0.85; }

    .foto-none {
      width: 52px; height: 52px; border-radius: 8px;
      border: 1px dashed var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: var(--text-muted); flex-shrink: 0;
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 999;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    #lightbox img {
      max-width: 94vw;
      max-height: 90vh;
      border-radius: 10px;
      object-fit: contain;
    }

    .btn-del {
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      border-radius: 5px; padding: 2px 8px; font-size: 13px;
      cursor: pointer; transition: all 0.15s; flex-shrink: 0;
    }

    .btn-del:hover { background: #ffebee; border-color: #ef9a9a; color: #c62828; }

    /* Paginación */
    #paginacion {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 12px 0 20px;
      flex-wrap: wrap;
    }

    .pag-info {
      font-size: 13px;
      color: var(--text-muted);
    }

    .pag-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── Mobile ─────────────────────────────────────────── */
    @media (max-width: 640px) {

      header { padding: 10px 12px; gap: 8px; }
      header h1 { font-size: 14px; }

      /* Botones del header: más pequeños y con wrap */
      .acciones { flex-wrap: wrap; justify-content: flex-end; gap: 6px; }
      .acciones .btn { padding: 6px 10px; font-size: 12px; }

      /* Ocultar botones menos usados en mobile */
      .acciones .btn-verde,
      .acciones .btn-azul:first-of-type { display: none; }

      .contenido { padding: 10px; }

      /* Resumen: números más grandes, cards más compactas */
      .resumen { gap: 8px; }
      .card-stat { padding: 10px; min-width: 80px; }
      .card-stat .numero { font-size: 24px; }

      /* Filtros: cada campo ocupa todo el ancho */
      .filtros { gap: 8px; padding: 10px 12px; }
      .filtros > div { width: 100%; }
      .filtros input { width: 100%; }
      .filtros .btn { width: 100%; padding: 9px; }

      /* Tabla: ocultar en mobile — la vista por obra es suficiente */
      .tabla-wrap { display: none; }
      #paginacion { display: none; }
      #aviso-mobile { display: block !important; }

      /* Lista por obra: más compacta */
      .registro-fila { gap: 8px; padding: 8px 12px; }
      .foto-thumb { width: 42px; height: 42px; }
      .foto-none  { width: 42px; height: 42px; }
      .empleado-nombre { font-size: 13px; }

      /* Obras */
      .nueva-obra-form input[type="text"],
      .nueva-obra-form input[type="number"] { width: 100%; }
      .obra-item { flex-wrap: wrap; gap: 8px; }
    }

    @media (max-width: 400px) {
      .card-stat .numero { font-size: 20px; }
      .empleado-header { font-size: 13px; }
    }

    /* Print */
    @media print {
      /* Ocultar controles */
      header .acciones,
      .filtros,
      .obras-section,
      .tabla-wrap,
      #paginacion,
      .btn-del,
      .btn-azul { display: none !important; }

      /* Fondo blanco */
      body, .contenido { background: #fff; }

      /* Header limpio */
      header {
        background: #1a1a2e !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        border-bottom: none;
      }

      /* Resumen */
      .card-stat { box-shadow: none; border: 1px solid #ccc; }

      /* Lista por obra */
      .empleado-bloque { box-shadow: none; page-break-inside: avoid; }
      .empleado-header {
        background: #1a1a2e !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      /* Fotos más pequeñas en impresión */
      .foto-thumb { width: 36px; height: 36px; }
      .foto-none  { width: 36px; height: 36px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Panel de Asistencia — Obra</h1>
    <div class="acciones">
      <button class="btn btn-gris" id="btn-tema-admin" onclick="toggleTemaAdmin()" title="Cambiar tema"></button>
      <button class="btn btn-gris"  onclick="cargarDatos()">Actualizar</button>
      <button class="btn btn-azul"  onclick="exportarCSV()">Exportar CSV</button>
      <button class="btn btn-verde" onclick="window.print()">Imprimir</button>
      <button class="btn btn-azul"    onclick="window.location.href='registro-caras.html'">👤 Registrar caras</button>
      <button class="btn btn-naranja" onclick="cerrarSesion()">Salir</button>
    </div>
  </header>

  <div class="contenido">

    <!-- Resumen -->
    <div class="resumen">
      <div class="card-stat">
        <div class="numero gris" id="cnt-total">—</div>
        <div class="label">Total registros</div>
      </div>
      <div class="card-stat">
        <div class="numero verde" id="cnt-ingresos">—</div>
        <div class="label">Ingresos</div>
      </div>
      <div class="card-stat">
        <div class="numero rojo" id="cnt-salidas">—</div>
        <div class="label">Salidas</div>
      </div>
    </div>

    <!-- Gestión de obras -->
    <div class="obras-section">
      <div class="obras-header">
        <span>⚙ Obras</span>
        <button class="btn btn-gris" onclick="toggleNuevaObra()">+ Nueva obra</button>
      </div>
      <div id="nueva-obra-form" style="display:none" class="nueva-obra-form">
        <div>
          <label>Nombre de la obra</label>
          <input type="text" id="z-nombre" placeholder="Ej: Obra Central" >
        </div>
        <div>
          <label>Latitud</label>
          <input type="number" id="z-lat" placeholder="-34.603722" step="any">
        </div>
        <div>
          <label>Longitud</label>
          <input type="number" id="z-lng" placeholder="-58.381592" step="any">
        </div>
        <div>
          <label>Radio (metros)</label>
          <input type="number" id="z-radio" value="200">
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-gris"  onclick="usarMiUbicacion()">Mi ubicación</button>
          <button class="btn btn-verde" onclick="agregarObra()">Guardar obra</button>
        </div>
      </div>
      <div id="obras-lista"></div>
    </div>

    <!-- Filtros -->
    <div class="filtros">
      <div>
        <label>Empleado</label>
        <input type="text" id="f-nombre" placeholder="Buscar por nombre">
      </div>
      <div>
        <label>Desde</label>
        <input type="date" id="f-desde" onchange="aplicarFiltros()">
      </div>
      <div>
        <label>Hasta</label>
        <input type="date" id="f-hasta" onchange="aplicarFiltros()">
      </div>
      <button class="btn btn-gris" onclick="limpiarFiltros()">Limpiar</button>
    </div>

    <!-- Aviso mobile (solo visible en pantallas pequeñas) -->
    <div id="aviso-mobile" style="display:none;background:var(--surface);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--text-muted);box-shadow:0 1px 4px rgba(0,0,0,0.08)">
      📋 La tabla completa se ve mejor en una pantalla más grande. Abajo ves los registros agrupados por obra.
    </div>

    <!-- Tabla general -->
    <div class="tabla-wrap">
      <table>
        <thead>
          <tr>
            <th>Empleado</th>
            <th>Tipo</th>
            <th>Fecha</th>
            <th>Hora</th>
            <th>Obra</th>
            <th>Verificación GPS</th>
            <th>Mapa</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="8" style="text-align:center;padding:20px;color:#888">Cargando...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Paginación -->
    <div id="paginacion"></div>

    <!-- Lista por obra -->
    <div class="lista-titulo">Registros por obra</div>
    <div id="lista-empleados"></div>

  </div>

  <!-- Lightbox -->
  <div id="lightbox" onclick="this.style.display='none'">
    <img id="lightbox-img" alt="Foto">
  </div>

  <script>
    if (sessionStorage.getItem("admin_auth") !== "ok") window.location.replace("login.html");

    function toggleTemaAdmin() {
      const html   = document.documentElement;
      const isDark = html.getAttribute("data-theme") === "dark";
      html.setAttribute("data-theme", isDark ? "light" : "dark");
      localStorage.setItem("theme", isDark ? "light" : "dark");
      actualizarIconAdmin();
    }

    function actualizarIconAdmin() {
      const btn = document.getElementById("btn-tema-admin");
      if (btn) btn.textContent = document.documentElement.getAttribute("data-theme") === "dark" ? "☀️" : "🌙";
    }

    document.addEventListener("DOMContentLoaded", actualizarIconAdmin);
  </script>
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin.js"></script>

</body>
</html>
