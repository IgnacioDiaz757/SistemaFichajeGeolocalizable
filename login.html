<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Acceso Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #eef0f4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 36px 28px 32px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    .icono {
      text-align: center;
      font-size: 40px;
      margin-bottom: 8px;
    }

    h1 {
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      color: #888;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .campo { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #999;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      color: #222;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }

    input:focus { border-color: #1a1a2e; background: #fff; }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 8px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    button:active { opacity: 0.85; }

    #error {
      margin-top: 14px;
      text-align: center;
      font-size: 13px;
      color: #c62828;
      font-weight: 600;
      min-height: 18px;
    }

    .volver {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #aaa;
      text-decoration: none;
    }

    .volver:hover { color: #555; }
  </style>
</head>
<body>

  <div class="card">
    <div class="icono">🔒</div>
    <h1>Acceso Administrativo</h1>

    <form id="form-login" onsubmit="login(event)">
      <div class="campo">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" placeholder="admin" autocomplete="username" required>
      </div>
      <div class="campo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="•••••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit">Ingresar</button>
    </form>

    <p id="error"></p>
    <a href="index.html" class="volver">← Volver al inicio</a>
  </div>

  <script src="login.js"></script>

</body>
</html>
