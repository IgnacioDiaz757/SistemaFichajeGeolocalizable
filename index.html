<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Asistencia Obra</title>
  <link rel="stylesheet" href="styles.css">
  <script>if(localStorage.getItem("theme")==="dark")document.documentElement.setAttribute("data-theme","dark");</script>
</head>
<body>

  <button class="btn-tema" id="btn-tema" onclick="toggleTema()" title="Cambiar tema"></button>
  <a href="login.html" class="btn-admin" title="Acceso admin">🔒</a>

  <!-- Modal cámara -->
  <div id="camara-modal">
    <video id="camara-video" autoplay playsinline muted></video>
    <div class="camara-bar">
      <button class="btn-camara-cancel" onclick="cerrarCamara()">Cancelar</button>
      <button class="btn-capturar"      onclick="capturarFoto()"></button>
      <button class="btn-flip"          onclick="flipCamara()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 4v6h6"/>
          <path d="M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
      </button>
    </div>
  </div>

  <canvas id="camara-canvas" style="display:none"></canvas>

  <div class="card">
    <img class="logo" src="public/images/Copia de Copia de Riveras del sur- Isologo colores.png" alt="Logo">
    <p class="titulo">Control de Asistencia</p>

    <div class="campo">
      <label>Foto</label>
      <div class="foto-area" id="foto-area" onclick="abrirCamara()">
        <img id="foto-preview" alt="Vista previa">

        <!-- Animación de escaneo -->
        <div id="scanner-overlay" style="display:none">
          <div class="scanner-line"></div>
          <div class="scanner-corner tl"></div>
          <div class="scanner-corner tr"></div>
          <div class="scanner-corner bl"></div>
          <div class="scanner-corner br"></div>
          <div class="scanner-texto">Identificando...</div>
        </div>

        <!-- Resultado del reconocimiento -->
        <div id="scanner-result" style="display:none">
          <div class="scanner-icono">✓</div>
          <span class="scanner-label">Bienvenido</span>
          <span id="scanner-nombre-result" class="scanner-nombre-result"></span>
        </div>

        <div class="foto-placeholder" id="foto-placeholder">
          <span class="icono">📷</span>
          <span>Sacar foto para identificarte</span>
        </div>
        <div class="foto-cambiar" id="foto-cambiar">📷 Cambiar foto</div>
      </div>
      <input type="file" id="foto-input" accept="image/*" capture="environment" style="display:none">
    </div>

    <div class="campo">
      <label for="empleado">Nombre del asociado</label>
      <input type="text" id="empleado" placeholder="Se completará automáticamente..." autocomplete="name">
    </div>

    <div class="campo">
      <label for="lugar">Obra</label>
      <select id="lugar">
        <option value="">Cargando obras...</option>
      </select>
    </div>

    <div class="hora-box">
      <span class="hora-label">Hora actual</span>
      <span class="hora-valor" id="hora">--</span>
    </div>

    <div class="botones">
      <button id="btn-ingreso" onclick="marcar('ingreso')">▲ Ingreso</button>
      <button id="btn-salida"  onclick="marcar('salida')">▼ Salida</button>
    </div>

    <p id="mensaje"></p>
  </div>

  <span id="ubicacion"></span>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script src="app.js"></script>

</body>
</html>
