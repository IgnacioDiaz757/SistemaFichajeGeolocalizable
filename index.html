<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Asistencia Obra</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #eef0f4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 32px 24px 28px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    .logo {
      display: block;
      max-width: 160px;
      margin: 0 auto 8px;
    }

    .titulo {
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      color: #888;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .campo { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #999;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      color: #222;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      -webkit-appearance: none;
    }

    input[type="text"]:focus { border-color: #1a1a2e; background: #fff; }

    /* Área de foto */
    .foto-area {
      width: 100%;
      border: 2px dashed #d0d0d0;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      background: #fafafa;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s;
    }

    .foto-area:active { border-color: #1a1a2e; }

    .foto-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 28px 16px;
      color: #aaa;
    }

    .foto-placeholder .icono { font-size: 32px; }
    .foto-placeholder span   { font-size: 13px; font-weight: 600; }

    #foto-preview {
      display: none;
      width: 100%;
      max-height: 220px;
      object-fit: cover;
    }

    .foto-cambiar {
      display: none;
      width: 100%;
      padding: 8px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      letter-spacing: 0.04em;
      cursor: pointer;
    }

    /* Modal cámara */
    #camara-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 999;
      flex-direction: column;
    }

    #camara-video {
      flex: 1;
      width: 100%;
      object-fit: cover;
    }

    .camara-bar {
      background: #000;
      padding: 20px 32px 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .btn-camara-cancel {
      background: none;
      border: 2px solid rgba(255,255,255,0.4);
      color: #fff;
      border-radius: 50px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-capturar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: #fff;
      border: 5px solid rgba(255,255,255,0.4);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s;
    }

    .btn-capturar:active { transform: scale(0.93); }

    /* Spacer para alinear el botón central */
    .camara-spacer { width: 90px; }

    /* Hora */
    .hora-box {
      background: #1a1a2e;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .hora-label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .hora-valor {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
    }

    .botones { display: flex; gap: 12px; margin-bottom: 4px; }

    button {
      flex: 1;
      padding: 16px 10px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    button:active   { transform: scale(0.97); }
    button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    #btn-ingreso { background: #2e7d32; color: #fff; }
    #btn-salida  { background: #c62828; color: #fff; }

    #mensaje {
      margin-top: 18px;
      text-align: center;
      font-size: 14px;
      min-height: 20px;
      color: #888;
      line-height: 1.5;
    }

    #mensaje.ok    { color: #2e7d32; font-weight: 700; }
    #mensaje.error { color: #c62828; font-weight: 700; }

    #ubicacion { display: none; }

    .btn-admin {
      position: fixed;
      top: 14px;
      right: 16px;
      background: rgba(255,255,255,0.85);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 1px 6px rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    @media (max-width: 360px) {
      .card { padding: 24px 16px 22px; }
      .hora-valor { font-size: 19px; }
      button { font-size: 14px; padding: 15px 8px; }
    }
  </style>
</head>
<body>

  <a href="login.html" class="btn-admin" title="Acceso admin">🔒</a>

  <!-- Modal cámara -->
  <div id="camara-modal">
    <video id="camara-video" autoplay playsinline muted></video>
    <div class="camara-bar">
      <button class="btn-camara-cancel" onclick="cerrarCamara()">Cancelar</button>
      <button class="btn-capturar"      onclick="capturarFoto()"></button>
      <div class="camara-spacer"></div>
    </div>
  </div>

  <canvas id="camara-canvas" style="display:none"></canvas>

  <div class="card">
    <img class="logo" src="public/images/Copia de Copia de Riveras del sur- Isologo colores.png" alt="Logo">
    <p class="titulo">Control de Asistencia</p>

    <div class="campo">
      <label for="empleado">Nombre del asociado</label>
      <input type="text" id="empleado" placeholder="Tu nombre completo" autocomplete="name">
    </div>

    <div class="campo">
      <label for="lugar">Lugar</label>
      <input type="text" id="lugar" placeholder="Ej: Obra.....">
    </div>

    <div class="campo">
      <label>Foto</label>
      <div class="foto-area" id="foto-area" onclick="abrirCamara()">
        <img id="foto-preview" alt="Vista previa">
        <div class="foto-placeholder" id="foto-placeholder">
          <span class="icono">📷</span>
          <span>Sacar foto</span>
        </div>
        <div class="foto-cambiar" id="foto-cambiar">📷 Cambiar foto</div>
      </div>
      <input type="file" id="foto-input" accept="image/*" capture="environment" style="display:none">
    </div>

    <div class="hora-box">
      <span class="hora-label">Hora actual</span>
      <span class="hora-valor" id="hora">--</span>
    </div>

    <div class="botones">
      <button id="btn-ingreso" onclick="marcar('ingreso')">▲ Ingreso</button>
      <button id="btn-salida"  onclick="marcar('salida')">▼ Salida</button>
    </div>

    <p id="mensaje"></p>
  </div>

  <span id="ubicacion"></span>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>

</body>
</html>
