<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar Empleados — Reconocimiento Facial</title>
  <script>if(localStorage.getItem("theme")==="dark")document.documentElement.setAttribute("data-theme","dark");</script>
  <style>
    :root {
      --bg:        #f0f0f0;
      --surface:   #ffffff;
      --header-bg: #1a1a2e;
      --text:      #333333;
      --text-muted:#888888;
      --text-label:#666666;
      --border:    #cccccc;
      --border-lt: #eeeeee;
      --input-bg:  #ffffff;
    }
    [data-theme="dark"] {
      --bg:        #0e1117;
      --surface:   #1a1f2e;
      --header-bg: #080b12;
      --text:      #e0e0e8;
      --text-muted:#9ca3af;
      --text-label:#6b7280;
      --border:    #2d3748;
      --border-lt: #1e2433;
      --input-bg:  #111827;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: var(--bg); color: var(--text); }

    header {
      background: var(--header-bg); color: #fff;
      padding: 14px 20px;
      display: flex; justify-content: space-between; align-items: center; gap: 10px;
    }
    header h1 { font-size: 16px; font-weight: bold; }
    .contenido { max-width: 700px; margin: 0 auto; padding: 16px; }

    .btn { padding: 8px 14px; border: none; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; }
    .btn-verde  { background: #2e7d32; color: #fff; }
    .btn-azul   { background: #1565c0; color: #fff; }
    .btn-gris   { background: #555; color: #fff; }

    /* Sección agregar */
    .seccion {
      background: var(--surface); border-radius: 8px; padding: 20px;
      margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .seccion h2 { font-size: 14px; font-weight: bold; margin-bottom: 14px; color: var(--text); }

    .fila-input { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
    .fila-input label { font-size: 12px; color: var(--text-label); display: block; margin-bottom: 4px; }
    .fila-input input {
      flex: 1; min-width: 200px;
      padding: 9px 12px; border: 1px solid var(--border);
      border-radius: 6px; font-size: 14px;
      background: var(--input-bg); color: var(--text);
    }

    #estado { font-size: 13px; margin-top: 10px; min-height: 18px; }
    #estado.ok    { color: #2e7d32; font-weight: bold; }
    #estado.error { color: #c62828; font-weight: bold; }

    /* Lista empleados */
    .empleado-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 0; border-bottom: 1px solid var(--border-lt); font-size: 14px;
    }
    .empleado-item:last-child { border-bottom: none; }
    .empleado-nombre { font-weight: 600; }

    .btn-del {
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      border-radius: 5px; padding: 4px 10px; font-size: 12px; cursor: pointer;
    }
    .btn-del:hover { background: #ffebee; border-color: #ef9a9a; color: #c62828; }

    /* Modal cámara */
    #camara-modal {
      display: none; position: fixed; inset: 0;
      background: #000; z-index: 999;
      flex-direction: column;
    }
    #reg-video { flex: 1; width: 100%; object-fit: cover; }
    #reg-canvas { display: none; }

    .camara-bar {
      background: #111; padding: 16px 24px 32px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }

    /* Puntos de progreso */
    .dots { display: flex; gap: 10px; }
    .dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: rgba(255,255,255,0.25); transition: background 0.2s;
    }
    .dot-ok { background: #4caf50; }

    #indicador { color: rgba(255,255,255,0.8); font-size: 13px; text-align: center; }

    .camara-acciones {
      display: flex; gap: 20px; align-items: center; justify-content: center;
    }

    .btn-capturar {
      width: 72px; height: 72px; border-radius: 50%;
      background: #fff; border: 4px solid transparent;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.85);
      cursor: pointer; transition: transform 0.1s;
    }
    .btn-capturar:active  { transform: scale(0.87); }
    .btn-capturar:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-cancelar-cam {
      background: none; border: 2px solid rgba(255,255,255,0.4);
      color: #fff; border-radius: 50px; padding: 10px 20px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>

  <header>
    <h1>Registrar Asociados</h1>
    <a href="admin.html" class="btn btn-gris">← Volver al panel</a>
  </header>

  <div class="contenido">

    <!-- Agregar asociado -->
    <div class="seccion">
      <h2>Agregar / actualizar asociado</h2>
      <div class="fila-input">
        <div style="flex:1;min-width:200px">
          <label>Nombre completo</label>
          <input type="text" id="inp-nombre" placeholder="Ej: Juan Pérez" autocomplete="off">
        </div>
        <div style="flex:1;min-width:180px">
          <label>Obra asignada</label>
          <select id="inp-obra" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;background:var(--input-bg);color:var(--text)">
            <option value="">Sin obra asignada</option>
          </select>
        </div>
        <div style="flex:1;min-width:160px">
          <label>Puesto / Cargo</label>
          <input type="text" id="inp-puesto" placeholder="Ej: Albañil" autocomplete="off">
        </div>
        <div style="flex:1;min-width:160px">
          <label>Contratista</label>
          <input type="text" id="inp-contratista" placeholder="Ej: Empresa SA" autocomplete="off">
        </div>
        <button class="btn btn-verde" onclick="abrirCamara()" style="align-self:flex-end">📷 Registrar cara</button>
      </div>
      <p id="estado"></p>
    </div>

    <!-- Lista asociados registrados -->
    <div class="seccion">
      <h2>Asociados con reconocimiento facial</h2>
      <div id="lista-asociados">
        <p style="color:#999;font-size:13px">Cargando...</p>
      </div>
    </div>

  </div>

  <!-- Modal cámara -->
  <div id="camara-modal">
    <video id="reg-video" autoplay playsinline muted></video>
    <canvas id="reg-canvas"></canvas>

    <div class="camara-bar">
      <div class="dots">
        <div class="dot" id="dot-0"></div>
        <div class="dot" id="dot-1"></div>
        <div class="dot" id="dot-2"></div>
      </div>
      <p id="indicador">Mirá a la cámara y presioná el botón</p>
      <div class="camara-acciones">
        <button class="btn-cancelar-cam" onclick="cerrarCamara()">Cancelar</button>
        <button class="btn-capturar" id="btn-capturar" onclick="capturarFoto()"></button>
      </div>
    </div>
  </div>

  <script>
    if (sessionStorage.getItem("admin_auth") !== "ok") window.location.replace("login.html");
  </script>
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script src="registro-caras.js"></script>

</body>
</html>
